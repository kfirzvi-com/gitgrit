{% extends "base.html" %}

{% block title %}New Stack — GitGud{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <a href="{% url 'stack_list' %}" class="text-sm opacity-70 hover:opacity-100">&larr; Stacks</a>
  <h1 class="text-3xl font-bold mb-6">New Stack</h1>

  <form method="post" class="card bg-base-100 shadow-xl">
    {% csrf_token %}
    <div class="card-body">
      <div class="form-control">
        <label class="label" for="id_name">
          <span class="label-text">Name</span>
        </label>
        <input type="text" name="name" id="id_name" required maxlength="255"
               class="input input-bordered w-full" placeholder="e.g. Backend Services" autofocus>
        {% if form.name.errors %}
          <label class="label">
            <span class="label-text-alt text-error">{{ form.name.errors.0 }}</span>
          </label>
        {% endif %}
      </div>
      <div class="form-control mt-4">
        <label class="label" for="id_description">
          <span class="label-text">Description</span>
        </label>
        <textarea name="description" id="id_description" rows="3"
                  class="textarea textarea-bordered w-full"
                  placeholder="Optional description"></textarea>
      </div>
      <div class="card-actions justify-end mt-4">
        <a href="{% url 'stack_list' %}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
