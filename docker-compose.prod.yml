# Air-gapped production compose for GitGrit.
#
# Usage:
#   1. Load images: `docker load -i gitgrit-bundle-${TAG}.tar`
#   2. Copy .env.example to .env and fill in values.
#   3. Place the operator's CA bundle at the host path referenced by
#      GITGRIT_CUSTOM_CA_FILE_PATH (default /opt/gitgrit/ca-bundle.pem).
#   4. `docker compose -f docker-compose.prod.yml up -d`
#   5. `docker compose -f docker-compose.prod.yml exec app \
#         python manage.py airgap_setup`
#
# Cloud / non-air-gap deployments use Kamal (see config/deploy.yml) and do
# NOT use this file. This file is exclusively for air-gapped installs.

services:
  db:
    image: postgres:15
    # Never pull: the air-gap host has no registry access. The image must be
    # present locally (loaded from the bundle tarball).
    pull_policy: never
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gitgrit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gitgrit}
    volumes:
      - gitgrit_pgdata:/var/lib/postgresql/data
    networks:
      - gitgrit_internal
    restart: unless-stopped

  app:
    image: gitgrit-app:${TAG:-latest}
    pull_policy: never
    depends_on:
      - db
    networks:
      - gitgrit_internal
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # The web container spawns sandbox containers via the host Docker
      # socket. The host-side /tmp/gitgrit-sandbox path must match the
      # in-container path so bind mounts resolve correctly.
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/gitgrit-sandbox:/tmp/gitgrit-sandbox
      # Operator CA bundle for self-hosted GitLab over the operator's TLS chain.
      - ${GITGRIT_CUSTOM_CA_FILE_PATH}:/etc/ssl/certs/custom-ca.pem:ro
    environment:
      AIRGAPPED: "True"
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      GITGRIT_ENCRYPTION_KEY: ${GITGRIT_ENCRYPTION_KEY}
      SITE_URL: ${SITE_URL}
      # DB — settings.py reads these individually, not as a URL.
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-gitgrit}
      DB_USER: ${POSTGRES_USER:-gitgrit}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Auth providers — flip Google/GitHub off when no internet egress.
      AUTH_PROVIDER_GITHUB_ENABLED: ${AUTH_PROVIDER_GITHUB_ENABLED:-False}
      AUTH_PROVIDER_GITLAB_ENABLED: ${AUTH_PROVIDER_GITLAB_ENABLED:-True}
      AUTH_PROVIDER_GOOGLE_ENABLED: ${AUTH_PROVIDER_GOOGLE_ENABLED:-False}
      GITLAB_URL: ${GITLAB_URL}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET}
      # Sandbox runtime — point at the same bridge so spawned sandbox
      # containers can reach `db` and the operator's internal GitLab.
      SANDBOX_NETWORK: gitgrit_internal
      SANDBOX_DNS: ${SANDBOX_DNS}
      # Operator CA — both the app's `requests` and the sandbox's `urllib`
      # honor these automatically once the bundle is mounted.
      GITGRIT_CUSTOM_CA_FILE_PATH: ${GITGRIT_CUSTOM_CA_FILE_PATH}
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/custom-ca.pem
      SSL_CERT_FILE: /etc/ssl/certs/custom-ca.pem
    restart: unless-stopped

networks:
  gitgrit_internal:
    # Fixed name so the sandbox runner can attach on-demand containers to
    # the same bridge as the app and database.
    name: gitgrit_internal
    driver: bridge

volumes:
  gitgrit_pgdata:
