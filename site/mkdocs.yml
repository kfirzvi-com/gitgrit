site_name: GitGrit
site_url: !ENV [DOCS_SITE_URL, "https://gitgrit.dev"]
site_description: Developer Experience Platform — Repository Standards, Team Health, and Delivery Performance
site_author: GitGrit

theme:
  name: material
  custom_dir: overrides
  logo: images/logo.svg
  favicon: images/logo.svg
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tracking
    # navigation.tabs intentionally disabled — the header carries only the
    # logo + a single "Docs" button (see overrides/partials/header.html).
    # navigation.sections / navigation.expand also disabled so each
    # top-level category in the sidebar is a collapsable click-target
    # rather than an always-open header.
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/kfirzvi-com/gitgrit
repo_name: kfirzvi-com/gitgrit

# mkdocs serve only watches docs/ and mkdocs.yml by default. Adding
# overrides/ here makes header.html / home.html edits hot-reload too.
watch:
  - overrides

nav:
  # Home (index.md) is intentionally absent from the sidebar — it's reached
  # via the logo. Including it would surface a redundant "Home" link in the
  # docs sidebar.
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Adding Projects: getting-started/projects.md
    - Writing Policies: getting-started/policies.md
    - Connect Cursor: getting-started/setup-cursor.md
    - Connect Cline: getting-started/setup-cline.md
    - Connect a Generic MCP Client: getting-started/setup-generic.md
  - Features:
    - Policy Marketplace: features/marketplace.md
    - Compliance Badges: features/badges.md
    - Policy Versioning: features/versioning.md
    - Analytics Dashboard: features/analytics.md
  - Policy API:
    - ProjectContext: api/project-context.md
  - Self-Hosting:
    - Overview: self-hosting/index.md
    - Installation: self-hosting/installation.md
    - Operations: self-hosting/operations.md

# Pages reachable outside the sidebar nav:
#   - Home (index.md): the logo links to it.
#   - Legal pages: linked from the footer and product surfaces (OAuth
#     consent, app footer).
not_in_nav: |
  /index.md
  /legal/terms.md
  /legal/privacy.md
  /legal/cookies.md
  /legal/accessibility.md
  /legal/sub-processors.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

extra_css:
  - stylesheets/tokens.css    # shared design tokens — single source of truth
  - stylesheets/custom.css    # Material theme variable mappings and component overrides

extra:
  is_staging: !ENV [DOCS_IS_STAGING, false]
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kfirzvi-com/gitgrit
  generator: false

copyright: "&copy; 2026 GitGrit — Developer Experience Platform"
