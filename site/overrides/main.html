{% extends "base.html" %}

{% block extrahead %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ── Global tokens ── */
    :root,
    [data-md-color-scheme="slate"] {
      --md-text-font: "DM Sans", sans-serif;
      --md-code-font: "JetBrains Mono", monospace;

      --md-default-bg-color: #0c0e13;
      --md-default-fg-color: #e2e8f0;
      --md-default-fg-color--light: #8892a4;
      --md-default-fg-color--lighter: #5a6478;
      --md-default-fg-color--lightest: #242938;

      --md-primary-fg-color: #0c0e13;
      --md-primary-bg-color: #e2e8f0;
      --md-accent-fg-color: #06b6d4;

      --md-code-bg-color: #13161d;
      --md-code-fg-color: #e2e8f0;
      --md-code-hl-color: rgba(6, 182, 212, 0.1);

      --md-typeset-a-color: #06b6d4;

      --md-footer-bg-color: #0c0e13;
      --md-footer-fg-color: #8892a4;
      --md-footer-fg-color--light: #5a6478;
      --md-footer-fg-color--lighter: #242938;

      --gg-border: #242938;
      --gg-surface: #13161d;
      --gg-cyan: #06b6d4;
    }

    /* ── Header ── */
    .md-header {
      background: #0c0e13 !important;
      border-bottom: 1px solid var(--gg-border);
      box-shadow: none !important;
      color: #e2e8f0;
    }
    .md-header__title {
      font-family: "DM Sans", sans-serif;
      font-weight: 700;
    }
    .md-header .md-logo img,
    .md-header .md-logo svg {
      filter: brightness(0) invert(1);
    }

    /* ── Top navigation tabs ── */
    .md-tabs {
      background: #0c0e13 !important;
      border-bottom: 1px solid var(--gg-border);
    }
    .md-tabs__link {
      font-family: "DM Sans", sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0.6;
    }
    .md-tabs__link--active,
    .md-tabs__link:hover {
      opacity: 1;
      color: var(--gg-cyan);
    }

    /* ── Sidebar ── */
    .md-sidebar {
      scrollbar-width: thin;
    }
    .md-nav__link {
      font-size: 0.85rem;
    }
    .md-nav__link--active,
    .md-nav__item .md-nav__link--active {
      color: var(--gg-cyan) !important;
      font-weight: 600;
    }
    .md-nav--primary .md-nav__title {
      font-family: "DM Sans", sans-serif;
      font-weight: 700;
    }

    /* ── Content typography ── */
    .md-typeset {
      font-size: 0.92rem;
      line-height: 1.7;
    }
    .md-typeset h1 {
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #e2e8f0;
      font-size: 2em;
    }
    .md-typeset h2 {
      font-weight: 700;
      letter-spacing: -0.01em;
      border-bottom: 1px solid var(--gg-border);
      padding-bottom: 0.4rem;
    }
    .md-typeset h3 {
      font-weight: 600;
      color: #e2e8f0;
    }

    /* ── Inline code ── */
    .md-typeset code {
      background: var(--gg-surface);
      border: 1px solid var(--gg-border);
      border-radius: 4px;
      color: var(--gg-cyan);
      font-size: 0.82em;
      padding: 0.1em 0.4em;
    }
    .md-typeset pre code {
      border: none;
      padding: 0;
      color: inherit;
      background: none;
    }

    /* ── Code blocks ── */
    .md-typeset pre {
      border: 1px solid var(--gg-border);
      border-radius: 8px;
    }
    .md-typeset .highlight {
      border-radius: 8px;
    }

    /* ── Tables ── */
    .md-typeset table:not([class]) {
      border: 1px solid var(--gg-border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.88rem;
    }
    .md-typeset table:not([class]) th {
      background: var(--gg-surface);
      font-weight: 600;
      border-bottom: 1px solid var(--gg-border);
    }
    .md-typeset table:not([class]) td {
      border-bottom: 1px solid #1a1e28;
    }

    /* ── Admonitions ── */
    .md-typeset .admonition,
    .md-typeset details {
      border-radius: 8px;
      border: 1px solid var(--gg-border);
    }

    /* ── Search ── */
    .md-search__input {
      background: var(--gg-surface) !important;
      border: 1px solid var(--gg-border);
      border-radius: 6px;
    }

    /* ── Footer ── */
    .md-footer {
      border-top: 1px solid var(--gg-border);
    }

    /* ── Copy button ── */
    .md-clipboard {
      color: #5a6478;
    }
    .md-clipboard:hover {
      color: var(--gg-cyan);
    }

    /* ── Content links ── */
    .md-typeset a:not(.md-button) {
      color: var(--gg-cyan);
      text-decoration: none;
    }
    .md-typeset a:not(.md-button):hover {
      color: #22d3ee;
      text-decoration: underline;
    }

    /* ── TOC ── */
    .md-nav--secondary .md-nav__link--active {
      color: var(--gg-cyan) !important;
    }

    /* ── Background dot grid (subtle) ── */
    .md-main {
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
{% endblock %}
