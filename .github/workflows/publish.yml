name: Publish & Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        type: choice
        options:
          - staging
        default: staging

permissions:
  contents: read
  packages: write

jobs:
  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.changes.outputs.app }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect what changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          APP=false
          DOCS=false
          # Check if any non-site/ files changed (app code)
          if echo "$CHANGED" | grep -qv '^site/'; then
            APP=true
          fi
          # Check if site/ files changed
          if echo "$CHANGED" | grep -q '^site/'; then
            DOCS=true
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "docs=$DOCS" >> "$GITHUB_OUTPUT"
          echo "App changed: $APP, Docs changed: $DOCS"

  publish:
    needs: detect
    if: always() && (needs.detect.outputs.app == 'true' || github.event_name != 'push')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kfirzvi-com/gitgrit
          tags: |
            type=sha,format=long,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            service=gitgrit
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [detect, publish]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: kfirzvi-com/infra
          event-type: deploy
          client-payload: >-
            {
              "environment": "${{ needs.publish.outputs.environment }}",
              "version": "${{ github.sha }}",
              "ref": "${{ github.sha }}",
              "image": "ghcr.io/kfirzvi-com/gitgrit"
            }

  deploy-docs:
    needs: detect
    if: always() && needs.detect.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: kfirzvi-com/infra
          event-type: deploy-docs
