name: Publish & Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        type: choice
        options:
          - staging
        default: staging

permissions:
  contents: read
  packages: write

jobs:
  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.changes.outputs.app }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect what changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          APP=false
          DOCS=false
          # Check if any non-site/ files changed (app code)
          if echo "$CHANGED" | grep -qv '^site/'; then
            APP=true
          fi
          # Check if site/ files changed
          if echo "$CHANGED" | grep -q '^site/'; then
            DOCS=true
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "docs=$DOCS" >> "$GITHUB_OUTPUT"
          echo "App changed: $APP, Docs changed: $DOCS"

  publish:
    needs: detect
    if: always() && (needs.detect.outputs.app == 'true' || github.event_name != 'push')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kfirzvi-com/gitgrit
          tags: |
            type=sha,format=long,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            service=gitgrit
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [detect, publish]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: kfirzvi-com/infra
          event-type: deploy
          client-payload: >-
            {
              "environment": "${{ needs.publish.outputs.environment }}",
              "version": "${{ github.sha }}",
              "ref": "${{ github.sha }}",
              "image": "ghcr.io/kfirzvi-com/gitgrit"
            }

  # Docs go to staging on every push to main that touches site/.
  # Production docs ship only on a tag push (see deploy-docs-production
  # below), keeping the docs release cadence aligned with the app's.
  deploy-docs-staging:
    needs: detect
    if: always() && needs.detect.outputs.docs == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs deploy (staging)
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: kfirzvi-com/infra
          event-type: deploy-docs
          client-payload: >-
            {
              "environment": "staging",
              "ref": "${{ github.sha }}"
            }

  deploy-docs-production:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs deploy (production)
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: kfirzvi-com/infra
          event-type: deploy-docs
          client-payload: >-
            {
              "environment": "production",
              "ref": "${{ github.ref_name }}"
            }

  # Air-gap bundle pipeline — runs on tag push only. Independent from the
  # cloud `publish` job above: builds its own copies of gitgrit-app and
  # gitgrit-sandbox via scripts/build-airgap-bundle.sh (which also stamps
  # GIT_SHA, verifies the stamp landed, and packages compose + .env.example
  # + the self-hosting docs). The bundle is uploaded as a workflow artifact
  # by `airgap-bundle`, then attached to a GitHub Release by `airgap-release`.
  #
  # We deliberately do NOT reuse the image `publish` pushed to GHCR — running
  # the script end-to-end keeps the SHA verification path identical between
  # CI and a local build, so a regression that breaks the bundle is caught
  # by the same code that operators rely on.
  airgap-bundle:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the build script's `git describe --tags
          # --exact-match HEAD` resolves the tag for GIT_TAG stamping.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build air-gap bundle
        run: |
          # Image tag follows semver convention: refs/tags/v1.0 -> 1.0.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building bundle for version: $VERSION"
          mkdir -p ./bundle-output
          OUT_DIR="$(pwd)/bundle-output" ./scripts/build-airgap-bundle.sh "$VERSION"
          # Drop the bare .tar — only the .tgz wrapper is shipped. The .tar
          # is the docker save output that lives inside the .tgz anyway.
          rm -f ./bundle-output/gitgrit-bundle-*.tar
          # Generate a checksum using the basename only so operators can
          # `sha256sum -c gitgrit-install-VERSION.tgz.sha256` in whatever
          # directory they unpack into.
          cd ./bundle-output
          TGZ_NAME=$(ls gitgrit-install-*.tgz | head -1)
          sha256sum "$TGZ_NAME" > "${TGZ_NAME}.sha256"
          ls -lh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: airgap-bundle
          path: ./bundle-output/
          retention-days: 30
          # The .tgz is already gzip-compressed; skip the artifact action's
          # second compression pass.
          compression-level: 0

  airgap-release:
    needs: airgap-bundle
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE workflow-level (they don't merge), so
    # this job intentionally drops `packages: write` and only keeps the
    # `contents: write` it needs to create a release.
    permissions:
      contents: write
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: airgap-bundle
          path: ./release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job skips checkout, so there's no local git repo for `gh`
          # to infer the target from — point it at the repo explicitly.
          GH_REPO: ${{ github.repository }}
        run: |
          # `gh release create` fails if a release for this tag already
          # exists. Tag pushes are the only trigger for this job, so each
          # run is genuinely a new release — re-runs after a transient
          # failure should target a freshly retagged commit, not the same
          # tag a second time.
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            ./release-assets/*.tgz \
            ./release-assets/*.tgz.sha256
