{% if messages %}
<div class="space-y-2 mb-4">
  {% for message in messages %}
    <div class="alert {% if message.tags == 'error' %}alert-error{% elif message.tags == 'warning' %}alert-warning{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %}">
      <span>{{ message }}</span>
    </div>
  {% endfor %}
</div>
{% endif %}
