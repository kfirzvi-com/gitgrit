<div id="project-owner">
  <span class="font-semibold">Owner:</span>
  <form hx-post="{% url 'update_project_owner' project.id %}"
        hx-target="#project-owner" hx-swap="outerHTML">
    {% csrf_token %}
    <input type="text" name="owner" value="{{ project.owner }}"
           placeholder="No owner" class="input input-bordered input-sm"
           list="owner-suggestions" autocomplete="off" />
    <datalist id="owner-suggestions">
      {% for o in existing_owners %}<option value="{{ o }}">{% endfor %}
    </datalist>
    <button type="submit" class="btn btn-sm">Save</button>
  </form>
</div>
