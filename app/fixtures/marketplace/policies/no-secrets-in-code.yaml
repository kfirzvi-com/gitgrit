slug: no-secrets-in-code
name: No Secrets in Code
description: >
  Scans file names for common secret/credential patterns that should not be
  committed to version control (e.g. .env, private keys, credential files).
author: GitGrit
version: 1
suggested_labels:
  - security
criteria:
  events:
    - push
    - manual
code: |
  def evaluate(project):
      files = project.list_files()
      secret_patterns = [
          ".env",
          ".pem",
          ".key",
          ".p12",
          ".pfx",
          "credentials.json",
          "service-account.json",
          "secrets.yaml",
          "secrets.yml",
          ".htpasswd",
      ]

      violations = []
      for f in files:
          basename = f.rsplit("/", 1)[-1] if "/" in f else f
          for pattern in secret_patterns:
              if basename == pattern or basename.endswith(pattern):
                  violations.append(f)
                  break

      if not violations:
          return {
              "passed": True,
              "score": 100,
              "message": "No secret files detected",
              "details": {"files_scanned": len(files)},
          }

      score = max(0, 100 - len(violations) * 25)
      return {
          "passed": False,
          "score": score,
          "message": f"Found {len(violations)} potential secret file(s)",
          "details": {"violations": violations},
      }
test_cases:
  - name: Clean repo
    input:
      list_files:
        - src/main.py
        - README.md
        - .gitignore
    expected:
      passed: true
      score: 100
  - name: Has .env file
    input:
      list_files:
        - src/main.py
        - .env
        - config/credentials.json
    expected:
      passed: false
