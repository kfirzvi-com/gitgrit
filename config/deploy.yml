# GitGrit — Kamal deployment configuration
#
# This is a template. To deploy:
# 1. Create config/deploy.<destination>.yml with your real values
# 2. Create .kamal/secrets.<destination> with your secrets (gitignored)
# 3. Run: kamal setup -d <destination>
#
# Generate a SECRET_KEY (use a static value — regenerating invalidates all sessions):
#   cat /dev/urandom | LC_ALL=C tr -dc 'a-zA-Z0-9' | fold -w 50 | head -n 1

service: gitgrit
image: kfirzvi-com/gitgrit

servers:
  web:
    hosts:
      - <SERVER_IP>
    cmd: gunicorn gitgrit.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:3000 --workers 2 --timeout 65 --keep-alive 5 --access-logfile -
    options:
      volume:
        - /var/run/docker.sock:/var/run/docker.sock
        - /tmp/gitgrit-sandbox:/tmp/gitgrit-sandbox

proxy:
  ssl: true
  host: example.com
  app_port: 3000
  healthcheck:
    path: /up/

registry:
  server: ghcr.io
  username: kfirzvi-com
  password:
    - GHCR_TOKEN

builder:
  arch: amd64

env:
  clear:
    DEBUG: "False"
    DB_HOST: gitgrit-db
    DB_PORT: "5432"
    DB_NAME: gitgrit
    DB_USER: gitgrit
    SITE_URL: https://example.com
  secret:
    - SECRET_KEY
    - DB_PASSWORD
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET
    - GITLAB_CLIENT_ID
    - GITLAB_CLIENT_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET

accessories:
  db:
    image: postgres:17
    host: <SERVER_IP>
    port: "5432:5432"
    env:
      clear:
        POSTGRES_DB: gitgrit
        POSTGRES_USER: gitgrit
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
